services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: invoice-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - invoice-net

  nginx:
    image: nginx:1.25-alpine
    container_name: invoice-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - invoice-net

  mysql:
    image: mysql:8.0
    container_name: invoice-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: invoice_manager
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: invoiceuser
      MYSQL_PASSWORD: invoicepass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - invoice-net

networks:
  invoice-net:
    driver: bridge

volumes:
  mysql_data:
